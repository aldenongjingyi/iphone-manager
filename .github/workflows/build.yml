name: Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: windows

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install pyinstaller flask pymobiledevice3 pillow pillow-heif adbutils

      - name: Build Python backend (macOS)
        if: runner.os == 'macOS'
        run: |
          pyinstaller \
            --onedir \
            --name pindahan-backend \
            --collect-all pymobiledevice3 \
            --collect-all pillow_heif \
            --add-data "iphone_manager/templates:iphone_manager/templates" \
            --add-data "iphone_manager/static:iphone_manager/static" \
            main.py
          echo "Python backend size: $(du -sh dist/pindahan-backend)"

      - name: Build Python backend (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          pyinstaller `
            --onedir `
            --name pindahan-backend `
            --collect-all pymobiledevice3 `
            --collect-all pillow_heif `
            --add-data "iphone_manager/templates;iphone_manager/templates" `
            --add-data "iphone_manager/static;iphone_manager/static" `
            main.py
          $size = (Get-Item dist\pindahan-backend\pindahan-backend.exe).Length / 1MB
          Write-Host "Python backend size: $([math]::Round($size,1)) MB"

      # ── Node / Electron ─────────────────────────────────────────────────────
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Build Electron app (macOS — universal .dmg)
        if: runner.os == 'macOS'
        run: npx electron-builder --mac --publish never
        env:
          # Skip code signing in CI (app will trigger Gatekeeper on first open)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Build Electron app (Windows — NSIS .exe)
        if: runner.os == 'Windows'
        run: npx electron-builder --win --publish never
        env:
          # Skip code signing — do NOT set WIN_CSC_LINK (even empty string causes errors)
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      # ── Upload artifacts ─────────────────────────────────────────────────────
      - name: Upload macOS .dmg
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: iphone-manager-mac
          path: dist-electron/*.dmg
          retention-days: 7

      - name: Upload Windows .exe
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: iphone-manager-windows
          path: dist-electron/*.exe
          retention-days: 7

  # ── Publish to GitHub Releases ──────────────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          body: |
            Automatically built from the latest commit on `main`.

            ### macOS
            1. Download **Pindahan-*.dmg** (arm64 for Apple Silicon, x64 for Intel)
            2. Open the .dmg and drag **Pindahan** to Applications
            3. First launch: right-click → **Open** to bypass Gatekeeper

            ### Windows
            1. Download **Pindahan-Setup-*.exe**
            2. Run the installer
            3. If SmartScreen warns you: click **More info → Run anyway**
            4. Requires Apple Mobile Device USB Driver (iTunes) for iPhone detection
            5. Requires ADB in PATH for Android detection
          files: |
            artifacts/*.dmg
            artifacts/*.exe
