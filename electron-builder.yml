appId: com.pindahan.app
productName: Pindahan
copyright: Copyright © 2025 Pindahan

directories:
  output: dist-electron
  buildResources: build-assets

files:
  - electron/**
  - "!node_modules/**"

# ── macOS ─────────────────────────────────────────────────────────────────────
mac:
  category: public.app-category.utilities
  darkModeSupport: true
  # icon: build-assets/icon.icns   # add a 1024×1024 .icns to enable
  target:
    - target: dmg
      arch: [x64, arm64]
  extraResources:
    - from: dist/pindahan-backend
      to: pindahan-backend

dmg:
  title: Pindahan
  window:
    width: 540
    height: 380
  contents:
    - x: 150
      y: 185
      type: file
    - x: 390
      y: 185
      type: link
      path: /Applications

# ── Windows ───────────────────────────────────────────────────────────────────
win:
  # icon: build-assets/icon.ico    # add a 256×256 .ico to enable
  target:
    - target: nsis
      arch: [x64]
  extraResources:
    - from: dist/pindahan-backend.exe
      to: pindahan-backend.exe

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Pindahan
