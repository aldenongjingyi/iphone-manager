<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f12;
      color: #f0f0f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 14px; padding: 40px;
      text-align: center;
    }
    .icon  { font-size: 48px; }
    h1     { font-size: 18px; font-weight: 700; }
    p      { font-size: 13px; color: #9898ab; max-width: 340px; line-height: 1.5; }
    button {
      margin-top: 8px;
      background: #0a84ff; color: #fff; border: none;
      padding: 9px 22px; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
    }
    button:hover { background: #2395ff; }
  </style>
</head>
<body>
  <div class="icon">⚠️</div>
  <h1>Backend disconnected</h1>
  <p>The iPhone Manager backend stopped unexpectedly. Relaunch the app to reconnect.</p>
  <button onclick="location.reload()">Retry</button>
</body>
</html>
