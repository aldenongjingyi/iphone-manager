services:
  - type: web
    name: iphone-manager
    runtime: python
    buildCommand: pip install -r requirements-deploy.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --threads 4 --timeout 120
    envVars:
      - key: DEMO_MODE
        value: "1"
      - key: PYTHON_VERSION
        value: "3.11.0"
    plan: free
